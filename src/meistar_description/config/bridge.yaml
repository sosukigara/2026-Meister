# LiDARデータをGazeboからROS 2へ流す設定
- ros_topic_name: "/scan"
  gz_topic_name: "/world/empty/model/meistar_bot/link/lidar_link/sensor/lidar/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

# cmd_vel を ROS 2 から Gazebo へ流す設定
- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/model/meistar_bot/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

# odom を Gazebo から ROS 2 へ流す設定
- ros_topic_name: "/odom"
  gz_topic_name: "/model/meistar_bot/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# TF (odom -> base_link) を Gazebo から ROS 2 へ流す設定
- ros_topic_name: "/tf"
  gz_topic_name: "/model/meistar_bot/tf"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS
